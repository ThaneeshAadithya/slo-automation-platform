[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short", "--strict-markers"]
markers = [
  "unit: unit tests (no external dependencies)",
  "integration: integration tests (require Prometheus)",
]

[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.coverage.run]
source = ["generator", "reporter", "alerting"]
omit = ["tests/*", "*/templates/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
