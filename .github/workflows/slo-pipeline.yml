name: SLO Pipeline

on:
  push:
    branches: [main]
    paths:
      - "slos/**"
      - "generator/**"
      - "reporter/**"
      - "alerting/**"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # Weekly Monday 8am — run reports

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate SLO Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate SLO YAML against schema
        run: python -m generator.validate
      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x

  generate:
    name: Generate Rules + Dashboards
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Prometheus rules
        run: python -m generator.run

      - name: Check for diffs in generated files
        id: diff
        run: |
          git diff --name-only prometheus/generated/ dashboards/grafana/
          CHANGED=$(git diff --name-only prometheus/generated/ dashboards/grafana/ | wc -l)
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Commit generated files (if changed)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prometheus/generated/ dashboards/grafana/
          git diff --cached --quiet || \
            git commit -m "chore: regenerate Prometheus rules and Grafana dashboards [skip ci]"
          git push

      - name: Comment diff on PR
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const diff = execSync('git diff --stat prometheus/generated/ dashboards/grafana/').toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔄 Generated File Changes\n\`\`\`\n${diff}\n\`\`\`\nThese files will be updated when this PR is merged.`
            });

  apply-rules:
    name: Apply to Cluster
    runs-on: ubuntu-latest
    needs: generate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1
      - name: Apply Prometheus rules
        run: |
          kubectl apply -f prometheus/generated/ -n monitoring
          echo "Applied rules:"
          kubectl get prometheusrule -n monitoring -l slo-managed=true

  weekly-report:
    name: Weekly SLO Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Generate and send weekly report
        run: |
          python -m reporter.generate \
            --output-html /tmp/slo-report.html \
            --output-text /tmp/slo-report.txt
        env:
          PROMETHEUS_URL:          ${{ secrets.PROMETHEUS_URL }}
          SLACK_SLO_WEBHOOK_URL:   ${{ secrets.SLACK_SLO_WEBHOOK_URL }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL:              ${{ secrets.FROM_EMAIL }}
          TO_EMAILS:               ${{ secrets.TO_EMAILS }}
          PAGERDUTY_ROUTING_KEY:   ${{ secrets.PAGERDUTY_ROUTING_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: slo-weekly-report
          path: /tmp/slo-report.html
